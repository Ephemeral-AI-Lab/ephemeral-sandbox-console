name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust and boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf
      - name: Build the shared packaged web resource
        run: |
          npm --prefix web ci
          npm --prefix web run build
      - name: Check repository boundaries
        run: bin/check-boundaries
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked
      - name: Run Rust tests
        run: cargo test --workspace --locked

  web:
    name: Web unit and production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install clean dependency tree
        run: npm ci
      - name: Run unit tests
        run: npm run test:unit
      - name: Build production assets
        run: npm run build

  package:
    name: Release package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf
      - name: Build the BFF and matching web bundle
        run: bin/package-console
      - name: Validate the installed layout
        run: |
          test -x dist/ephemeral-sandbox-console/bin/sandbox-console
          test -x dist/ephemeral-sandbox-console/bin/start-sandbox-console
          test -f dist/ephemeral-sandbox-console/share/ephemeral-sandbox-console/index.html
      - name: Build the Tauri desktop package
        run: npm --prefix web run tauri -- build --bundles deb --ci -- --locked
      - name: Validate the packaged desktop web resource
        run: |
          desktop_deb=$(find target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' -print -quit)
          test -n "$desktop_deb"
          extract_root=$(mktemp -d)
          trap 'rm -rf "$extract_root"' EXIT
          dpkg-deb --extract "$desktop_deb" "$extract_root"
          packaged_index=$(find "$extract_root" -type f -path '*/web-dist/index.html' -print -quit)
          test -n "$packaged_index"
          diff -qr web/dist "$(dirname "$packaged_index")"
      - uses: actions/upload-artifact@v4
        with:
          name: ephemeral-sandbox-console-linux
          path: |
            dist/ephemeral-sandbox-console-*.tar.gz
            target/release/bundle/deb/*.deb
          if-no-files-found: error

  browser:
    name: Browser, accessibility, and security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install clean dependency tree
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser tests
        run: npm run test:e2e -- --grep-invert "@visual|@a11y|@security"
      - name: Run accessibility tests
        run: npm run test:a11y
      - name: Run security tests
        run: npm run test:security

  visual:
    name: Visual regression
    runs-on: macos-14
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install clean dependency tree
        run: npm ci
      - name: Install Chromium
        run: npx playwright install chromium
      - name: Run visual tests against the committed Darwin baselines
        run: npm run test:visual

  live-pinned-core:
    name: Live pinned-core smoke
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Exercise the console against the immutable core revision
        run: bin/live-pinned-core-check
